syntax = "proto3";

option java_package = "com.example.memogotchi.focusguard";
option java_multiple_files = true;

message FocusGuardConfig {
  repeated BlockedApp blocked_apps = 1;
  repeated AppTimeLimit time_limits = 2;
  repeated ScheduleBlock schedules = 3;
}

message BlockedApp {
  string package_name = 1;
  string app_label = 2;
  bool is_hard_block = 3;
  bool is_active = 4;
  UnblockMethod unblock_method = 5;
  PhraseConfig phrase_config = 6;
  DelayConfig delay_config = 7;
  MathConfig math_config = 8;
}

message AppTimeLimit {
  string package_name = 1;
  int32 daily_limit_minutes = 2;
}

message ScheduleBlock {
  string id = 1;
  string name = 2;
  repeated string package_names = 3;
  repeated DayOfWeek active_days = 4;
  int32 start_hour = 5;
  int32 start_minute = 6;
  int32 end_hour = 7;
  int32 end_minute = 8;
  bool is_enabled = 9;
}

message PhraseConfig {
  PhraseTone tone = 1;
}

message DelayConfig {
  int32 delay_seconds = 1;
}

message MathConfig {
  MathDifficulty difficulty = 1;
}

enum UnblockMethod {
  UNBLOCK_METHOD_UNSPECIFIED = 0;
  PHRASE = 1;
  DELAY = 2;
  MATH = 3;
}

enum PhraseTone {
  PHRASE_TONE_UNSPECIFIED = 0;
  DEFAULT = 1;
  HARSH = 2;
}

enum MathDifficulty {
  MATH_DIFFICULTY_UNSPECIFIED = 0;
  EASY = 1;
  MEDIUM = 2;
  HARD = 3;
}

enum DayOfWeek {
  DAY_OF_WEEK_UNSPECIFIED = 0;
  MONDAY = 1;
  TUESDAY = 2;
  WEDNESDAY = 3;
  THURSDAY = 4;
  FRIDAY = 5;
  SATURDAY = 6;
  SUNDAY = 7;
}